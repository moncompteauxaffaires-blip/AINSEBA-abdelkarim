<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Prince vs Boss">
    <meta name="theme-color" content="#007BFF">
    <title>Prince vs Boss</title>
    <style>
        * {
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        #game {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        h1 {
            margin: 0 0 20px 0;
            font-size: 2rem;
            color: #333;
        }
        
        h2 {
            margin: 15px 0;
            font-size: 1.5rem;
            color: #667eea;
        }
        
        .status {
            font-weight: bold;
            font-size: 1.1rem;
            margin: 10px 0;
            color: #333;
        }
        
        .status span {
            color: #007BFF;
            font-size: 1.3rem;
        }
        
        #attack-button {
            padding: 18px 40px;
            font-size: 1.1rem;
            margin: 20px 0;
            border: none;
            border-radius: 12px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            font-weight: bold;
            min-height: 50px;
            min-width: 150px;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        #attack-button:active {
            transform: scale(0.95);
            background-color: #0056b3;
        }
        
        #attack-button:disabled {
            background-color: #ccc;
            opacity: 0.6;
        }
        
        #message {
            margin-top: 20px;
            font-size: 1rem;
            color: #555;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* iPad specific optimizations */
        @media (min-width: 768px) {
            #game {
                max-width: 600px;
                padding: 40px 30px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            h2 {
                font-size: 1.8rem;
            }
            
            #attack-button {
                padding: 20px 60px;
                font-size: 1.3rem;
                min-height: 60px;
                min-width: 200px;
            }
        }
        
        /* iPhone X/11/12/13/14 notch support */
        @supports (padding: max(0px)) {
            body {
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>👑 Prince vs Boss 👑</h1>
        <h2 id="kingdom-title"></h2>
        <div class="status">Vies: <span id="lives"></span></div>
        <div class="status">Boss HP: <span id="boss-hp"></span></div>
        <button id="attack-button">⚔️ Attaquer</button>
        <div id="message"></div>
    </div>
    
    <script>
        const kingdoms = [
            { name: 'Royaume 1', bossHp: 10 },
            { name: 'Royaume 2', bossHp: 15 },
            { name: 'Royaume 3', bossHp: 20 },
            { name: 'Royaume 4', bossHp: 25 },
            { name: 'Royaume 5', bossHp: 30 },
            { name: 'Royaume 6', bossHp: 35 },
            { name: 'Royaume 7', bossHp: 40 }
        ];

        let currentKingdom = 0;
        let lives = 3;
        let bossHp = kingdoms[currentKingdom].bossHp;

        function updateUI() {
            document.getElementById('kingdom-title').innerText = kingdoms[currentKingdom].name;
            document.getElementById('lives').innerText = lives;
            document.getElementById('boss-hp').innerText = bossHp;
            document.getElementById('message').innerText = '';
            
            // Disable button if game is over
            const button = document.getElementById('attack-button');
            button.disabled = lives <= 0;
        }

        document.getElementById('attack-button').addEventListener('click', () => {
            if (lives <= 0) return;
            
            const damage = Math.floor(Math.random() * 5) + 1;
            bossHp -= damage;
            document.getElementById('message').innerText = `Vous infligez ${damage} dommages.`;

            if (bossHp <= 0) {
                document.getElementById('message').innerText = 'Vous avez vaincu le boss! 🎉';
                currentKingdom++;
                if (currentKingdom < kingdoms.length) {
                    bossHp = kingdoms[currentKingdom].bossHp;
                    setTimeout(updateUI, 1500);
                } else {
                    document.getElementById('message').innerText = 'Vous avez sauvé la princesse! 👑✨';
                    document.getElementById('attack-button').disabled = true;
                }
            } else {
                const bossDamage = Math.floor(Math.random() * 3) + 1;
                lives -= bossDamage;
                document.getElementById('message').innerText += ` Le boss vous inflige ${bossDamage} dommages!`;

                if (lives <= 0) {
                    document.getElementById('message').innerText = 'Vous êtes mort! Fin du jeu. 💀';
                    document.getElementById('attack-button').disabled = true;
                }
            }
            updateUI();
        }, { passive: true });

        // Prevent zooming on double tap
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        updateUI();
    </script>
</body>
</html>
