<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Game</title>
    <style>
        /* Mobile responsiveness improvements */
        body {
            padding: 0;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button {
            padding: 15px 25px;
            font-size: 18px;
            margin: 10px 0;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Game</h1>
        <button>Start Game</button>
        <button>Settings</button>
        <button>Exit</button>
    </div>
</body>
</html>
